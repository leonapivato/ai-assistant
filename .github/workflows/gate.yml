name: gate

# The Definition-of-Done gate (CONTRIBUTING, "The gate"), run remotely so a
# passing PR means the gate passed on neutral ground — not just on the author's
# machine. Ratified in ADR-0010.

on:
  # `ready_for_review` is explicit so marking a draft PR ready re-runs the gate —
  # which is what lets the codex-review workflow (ADR-0012) fire on that
  # transition via workflow_run. The other three are the default pull_request set.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [master]

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install the pinned Python
        run: uv python install

      - name: Sync the locked environment
        run: uv sync --locked

      # Pinned so a `just`-language change (e.g. how a variadic parameter
      # forwards arguments) can't silently start behaving differently between
      # a contributor's machine and CI. Needed only for the tests that drive
      # the actual justfile end to end (test_workspace.py's
      # test_just_claim_workspace_recipe_*) rather than the underlying
      # scripts directly — without this, those tests unconditionally skip in
      # CI (the only place the gate is actually enforced), so a broken recipe
      # could pass the required check while making the documented `just`
      # command unusable (PR #23 review finding).
      - name: Install just
        uses: extractions/setup-just@v3
        with:
          just-version: 1.57.0

      # The five gate steps, in the same order as the local gate. `--check`
      # makes the formatter report drift instead of rewriting files in CI.
      - name: Format
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy

      - name: Architecture boundaries
        run: uv run lint-imports

      - name: Tests
        run: uv run pytest
